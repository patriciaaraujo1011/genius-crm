<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offer Expired - Cool Girl Rehab</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Playfair Display', Georgia, serif;
            background-color: #F5F0E8;
            color: #2D2D2D;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            text-align: center;
        }
        h1 {
            color: #8A0329;
            font-size: 2.5rem;
            margin-bottom: 20px;
        }
        p {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .cta-button {
            display: inline-block;
            background-color: #8A0329;
            color: #F5F0E8;
            padding: 15px 40px;
            text-decoration: none;
            font-size: 1.1rem;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        .cta-button:hover {
            background-color: #6a0220;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Offer Expired</h1>
        <p>This special offer has expired. Don't worry - you can still get started with Cool Girl Rehab!</p>
        <a href="/" class="cta-button">Return Home</a>
    </div>
</body>
</html>
