<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Funnel Preview - CGR Collection</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --burgundy: #8A0329;
            --lime: #EAFF9D;
            --cream: #F5F0E8;
            --charcoal: #2D2D2D;
        }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        body {
            font-family: 'Playfair Display', Georgia, serif;
            background: var(--charcoal);
            color: var(--cream);
        }

        .top-bar {
            height: 60px;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
        }

        .page-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            cursor: pointer;
            transition: all 0.3s;
        }

        .page-dot.active {
            background: var(--lime);
        }

        .page-label {
            color: white;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            opacity: 0.5;
            cursor: pointer;
        }

        .page-label.active {
            opacity: 1;
            color: var(--lime);
        }

        .preview-frame {
            position: fixed;
            top: 60px;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            height: calc(100% - 60px);
            border: none;
            z-index: 1;
        }

        .preview-frame.mobile {
            left: 50%;
            transform: translateX(-50%);
            width: 375px;
            max-width: 375px;
        }

        .dev-bar {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--charcoal);
            padding: 8px 16px;
            border-radius: 30px;
            display: flex;
            gap: 8px;
            z-index: 99;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .dev-btn {
            background: transparent;
            border: 2px solid var(--lime);
            color: var(--lime);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
        }

        .dev-btn.active {
            background: var(--lime);
            color: var(--charcoal);
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <a href="/funnels/templates/" style="color: white; text-decoration: none; font-size: 14px;">&larr; Back</a>
        <span class="page-label active" data-page="0" onclick="showPage(0)">Sales</span>
        <span class="page-label" data-page="1" onclick="showPage(1)">Order</span>
        <span class="page-label" data-page="2" onclick="showPage(2)">Upsell</span>
        <span class="page-label" data-page="3" onclick="showPage(3)">Thank You</span>
    </div>

    <iframe class="preview-frame active" id="mainFrame" src="/preview/sales/"></iframe>

    <div class="dev-bar">
        <button class="dev-btn active" onclick="setDevice('desktop')">Desktop</button>
        <button class="dev-btn" onclick="setDevice('mobile')">Mobile</button>
    </div>

    <script>
        var pages = [
            '/preview/sales/?preview=1',
            '/preview/order/?preview=1',
            '/preview/upsell/?preview=1',
            '/preview/thank-you/?preview=1'
        ];

        var currentPage = 0;

        function showPage(index) {
            document.getElementById('mainFrame').src = pages[index];

            document.querySelectorAll('.page-label').forEach(function(el) {
                el.classList.remove('active');
            });
            document.querySelectorAll('.page-label')[index].classList.add('active');

            currentPage = index;
        }

        function setDevice(device) {
            document.querySelectorAll('.dev-btn').forEach(function(btn) {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            var frame = document.getElementById('mainFrame');
            if (device === 'mobile') {
                frame.classList.add('mobile');
            } else {
                frame.classList.remove('mobile');
            }
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === '1') showPage(0);
            if (e.key === '2') showPage(1);
            if (e.key === '3') showPage(2);
            if (e.key === '4') showPage(3);
        });
    </script>
</body>
</html>
