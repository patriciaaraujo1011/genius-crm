{% extends "emails/base.html" %}

{% block email_body %}
<h1>{{ subject }}</h1>

{{ message|linebreaks }}

{% if cta_url %}
<div style="margin: 30px 0;">
    <a href="{{ cta_url }}" class="btn">{{ cta_text|default:'Learn More' }}</a>
</div>
{% endif %}

<p style="margin-top: 30px;">
    Best regards,<br>
    {% if signature %}{{ signature }}{% else %}The Team{% endif %}
</p>
{% endblock %}
